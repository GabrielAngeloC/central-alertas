services:
  postgres:
    image: postgres:16
    container_name: central_alertas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - central_alertas_pgdata:/var/lib/postgresql/data
    networks:
      - central_alertas_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: src/CentralAlertas.Api/Dockerfile
    container_name: central_alertas_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}

      ApiKey__Value: ${API_KEY_VALUE}

      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES}

      AdminUser__Name: ${ADMIN_USER_NAME}
      AdminUser__Email: ${ADMIN_USER_EMAIL}
      AdminUser__Password: ${ADMIN_USER_PASSWORD}

      Telegram__BotToken: ${TELEGRAM_BOT_TOKEN}

      Email__SmtpHost: ${EMAIL_SMTP_HOST}
      Email__SmtpPort: ${EMAIL_SMTP_PORT}
      Email__Username: ${EMAIL_USERNAME}
      Email__Password: ${EMAIL_PASSWORD}
      Email__FromEmail: ${EMAIL_FROM_EMAIL}
      Email__FromName: ${EMAIL_FROM_NAME}
      Email__UseSsl: ${EMAIL_USE_SSL}

      Workers__Heartbeat__Enabled: ${HEARTBEAT_ENABLED}
      Workers__Heartbeat__IntervalSeconds: ${HEARTBEAT_INTERVAL_SECONDS}

      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "8080:8080"
    networks:
      - central_alertas_network

volumes:
  central_alertas_pgdata:

networks:
  central_alertas_network:
    driver: bridge
