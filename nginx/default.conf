server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Tamanho maximo de upload/payload aceito (ajuste se necessario).
    client_max_body_size 10m;

    # Gzip para os assets estaticos.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy reverso da API. O frontend chama caminhos relativos (/api/v1/...),
    # entao tudo que comecar com /api vai para o servico "api" do Compose.
    # "api" e o nome do servico na rede do Docker; resolve via DNS interno.
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Healthcheck da API exposto (opcional, util para monitoramento externo).
    location = /health {
        proxy_pass       http://api:8080/health;
        proxy_set_header Host $host;
    }

    # SPA fallback: qualquer rota desconhecida devolve o index.html,
    # para o Vue Router cuidar do roteamento no cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo para assets versionados pelo Vite (hash no nome).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
